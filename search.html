<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Search movies, TV, books, and YouTube on ours." />
    <title>explore — ours</title>
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="logo-link" href="index.html">
          <img src="assets/logo.svg" alt="" width="40" height="28" />
          ours
        </a>
        <nav class="site-nav" aria-label="Main">
          <a href="index.html" data-nav="index.html">home</a>
          <a href="search.html" data-nav="search.html">explore</a>
          <a href="library.html" data-nav="library.html">library</a>
          <a href="partner.html" data-nav="partner.html" class="nav-partner">our bond</a>
        </nav>
      </div>
    </header>

    <main>
      <h1 class="page-title">explore</h1>
      <p class="page-subtitle">
        Search global catalogs — movies &amp; TV from TMDB, books in English, YouTube videos worldwide.
        Recommendations appear after each search.
      </p>

      <div class="search-panel glass-panel">
        <div class="category-tabs" role="tablist" aria-label="Media type">
          <button type="button" class="tab-btn active" data-category="movie" role="tab" aria-selected="true">movies</button>
          <button type="button" class="tab-btn" data-category="tv" role="tab" aria-selected="false">tv</button>
          <button type="button" class="tab-btn" data-category="book" role="tab" aria-selected="false">books</button>
          <button type="button" class="tab-btn" data-category="youtube" role="tab" aria-selected="false">youtube</button>
        </div>

        <form id="searchForm" class="search-row">
          <label for="searchInput" class="sr-only">Search</label>
          <input id="searchInput" type="search" placeholder="Parasite, Severance, Murakami…" autocomplete="off" required />
          <button type="submit" class="btn btn-glow">search</button>
        </form>
        <p id="searchStatus" class="search-status" aria-live="polite"></p>
      </div>

      <section class="section">
        <div class="section-head">
          <h2>results</h2>
        </div>
        <div id="resultsGrid" class="results-grid"></div>
      </section>

      <section id="recommendationsSection" class="recommendations hidden">
        <h3>you might also love</h3>
        <div id="recommendationsGrid" class="results-grid"></div>
      </section>
    </main>

    <footer class="site-footer">
      <img class="footer-hearts" src="assets/logo.svg" alt="" width="28" height="20" />
      <p>made with ♥ — ours</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/common.js"></script>
    <script src="js/ratings.js"></script>
    <script src="js/api.js"></script>
    <script src="js/search.js"></script>
  </body>
</html>
