<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Search movies, TV, books, and YouTube on Ours." />
    <title>Explore — Ours</title>
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="logo-link" href="index.html">
          <img src="assets/logo.svg" alt="" width="44" height="30" />
          Ours
        </a>
        <nav class="site-nav" aria-label="Main">
          <a href="index.html" data-nav="index.html">Home</a>
          <a href="search.html" data-nav="search.html">Explore</a>
          <a href="library.html" data-nav="library.html">Our Library</a>
        </nav>
      </div>
    </header>

    <main>
      <h1 class="page-title">Explore</h1>
      <p class="page-subtitle">
        Search global libraries of movies, TV, books, and YouTube — with recommendations based on what you look for.
      </p>

      <div class="search-panel">
        <div class="category-tabs" role="tablist" aria-label="Media type">
          <button type="button" class="tab-btn active" data-category="movie" role="tab" aria-selected="true">🎬 Movies</button>
          <button type="button" class="tab-btn" data-category="tv" role="tab" aria-selected="false">📺 TV Shows</button>
          <button type="button" class="tab-btn" data-category="book" role="tab" aria-selected="false">📚 Books</button>
          <button type="button" class="tab-btn" data-category="youtube" role="tab" aria-selected="false">▶️ YouTube</button>
        </div>

        <form id="searchForm" class="search-row">
          <label for="searchInput" class="sr-only">Search</label>
          <input
            id="searchInput"
            type="search"
            placeholder="Try: Parasite, Dark, Murakami, travel vlog…"
            autocomplete="off"
            required
          />
          <button type="submit" class="btn btn-primary">Search</button>
        </form>
        <p id="searchStatus" class="search-status" aria-live="polite"></p>
      </div>

      <section class="section">
        <div class="section-head">
          <h2>Results</h2>
        </div>
        <div id="resultsGrid" class="results-grid"></div>
      </section>

      <section id="recommendationsSection" class="recommendations hidden">
        <h3>💕 You might also love</h3>
        <div id="recommendationsGrid" class="results-grid"></div>
      </section>
    </main>

    <footer class="site-footer">
      <img class="footer-hearts" src="assets/logo.svg" alt="" width="32" height="22" />
      <p>Made with ♥ for the two of you — Ours</p>
    </footer>

    <script src="js/common.js"></script>
    <script src="js/api.js"></script>
    <script src="js/search.js"></script>
  </body>
</html>
