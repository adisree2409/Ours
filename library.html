<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Your library on ours." />
    <title>library — ours</title>
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="logo-link" href="index.html">
          <img src="assets/logo.svg" alt="" width="40" height="28" />
          ours
        </a>
        <nav class="site-nav" aria-label="Main">
          <a href="index.html" data-nav="index.html">home</a>
          <a href="search.html" data-nav="search.html">explore</a>
          <a href="library.html" data-nav="library.html">library</a>
          <a href="partner.html" data-nav="partner.html" class="nav-partner">our bond</a>
        </nav>
      </div>
    </header>

    <main>
      <h1 class="page-title">library</h1>
      <p class="page-subtitle">
        Everything you've saved with heart ratings (0–10). Syncs across devices when Google sign-in arrives.
      </p>

      <div class="library-filters" id="libraryFilters">
        <button type="button" class="tab-btn active" data-filter="all">all</button>
        <button type="button" class="tab-btn" data-filter="movie">movies</button>
        <button type="button" class="tab-btn" data-filter="tv">tv</button>
        <button type="button" class="tab-btn" data-filter="book">books</button>
        <button type="button" class="tab-btn" data-filter="youtube">youtube</button>
      </div>

      <div id="libraryContent">
        <div id="libraryGrid" class="results-grid"></div>
        <div id="libraryEmpty" class="library-empty hidden">
          <img src="assets/logo.svg" alt="" width="48" height="33" style="margin: 0 auto 16px; opacity: 0.6" />
          <p>Nothing saved yet. Explore and tap <strong>save to ours</strong> to rate with hearts.</p>
          <a class="btn btn-glow" href="search.html">go explore</a>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <img class="footer-hearts" src="assets/logo.svg" alt="" width="28" height="20" />
      <p>made with ♥ — ours</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/common.js"></script>
    <script src="js/ratings.js"></script>
    <script src="js/api.js"></script>
    <script src="js/library.js"></script>
  </body>
</html>
